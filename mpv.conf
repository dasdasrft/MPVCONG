vo=gpu-next
gpu-api=vulkan
hwdec=vulkan
blend-subtitles=video

volume-max=150
volume=75
af=lavfi=[dynaudnorm=m=3.0:g=15:r=0.5,equalizer=f=400:t=q:w=1.5:g=4,equalizer=f=10000:t=q:w=2:g=-4]

alang=zh,chi,jpn,eng
slang=zh-hans,zh-cn,chs,zh-hant,zh-tw,cht,zh
sub-font-size=44
sub-border-size=1.5
sub-blur=1
sub-shadow-offset=2
sub-shadow-color=0.0/0.0/0.0/0.6

directory-filter-types=video
audio-file-auto=fuzzy
sub-auto=fuzzy

save-position-on-quit
watch-later-options=start,vid,aid,sid,sub-delay
hr-seek=no

script-opts=osc-deadzonesize=1
script-opts-add=console-font_size=12
script-opts-add=stats-font_size=12
title-bar=no
snap-window
no-osd-bar
cursor-autohide=1000

input-builtin-bindings=no
input-default-bindings=no
input-doubleclick-time=200

msg-level=ffmpeg=error,cplayer=warn,auto_profiles=info,autoload=warn,autocrop=warn

[Auto-DV-Fix]
profile-cond=p["video-params/colormatrix"] == "dolbyvision" and p["video-params/colorlevels"] ~= "full"
profile-restore=copy
target-colorspace-hint-mode=source

[SDR-target]
profile-desc=SDR 显示目标配置
profile-cond=get("video-params/gamma") == "bt.1886" 
profile-restore=copy
gamma=10
